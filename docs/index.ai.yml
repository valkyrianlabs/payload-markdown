version: 1

title: Payload Markdown Documentation
canonical: /plugins/payload-markdown
output: /plugins/payload-markdown.md

description: >
  Consolidated AI-facing documentation export for @valkyrianlabs/payload-markdown,
  a Payload CMS Markdown field and block plugin with CodeMirror authoring,
  Shiki rendering, directive themes, and server-first Markdown output.

preamble: |
  This file is intended for AI agents, editor tooling, Codex, ChatGPT,
  and offline reference.

  Read the documents in the listed order. Installation, field and block setup,
  rendering, and configuration should be treated as prerequisite context before
  directive authoring, advanced troubleshooting, or migrations.

order:
  - ./index.md
  - ./getting-started/index.md
  - ./getting-started/installation.md
  - ./getting-started/fields-and-blocks.md
  - ./getting-started/rendering.md
  - ./configuration/index.md
  - ./configuration/plugin-config.md
  - ./configuration/scoping.md
  - ./configuration/code-blocks.md
  - ./configuration/styling.md
  - ./configuration/directive-themes.md
  - ./directives/index.md
  - ./directives/callout.md
  - ./directives/details.md
  - ./directives/table-of-contents.md
  - ./directives/steps.md
  - ./directives/cards.md
  - ./directives/tabs.md
  - ./directives/layout.md
  - ./authoring/index.md
  - ./authoring/editor.md
  - ./authoring/rich-examples.md
  - ./authoring/markdown-in-markdown.md
  - ./advanced/index.md
  - ./advanced/troubleshooting.md
  - ./advanced/migrations.md
  - ./advanced/v1-v1-1.md
  - ./reference/api.md

exclude:
  - ./drafts/**

orphans: append
headingMode: normalize

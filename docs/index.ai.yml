version: 1

title: Payload Markdown Documentation
canonical: /plugins/payload-markdown
output: /plugins/payload-markdown.md

description: >
  Consolidated AI-facing documentation export for
  @valkyrianlabs/payload-markdown.

preamble: |
  This file is intended for AI agents, editor tooling, Codex, ChatGPT,
  Claude, and offline reference.

  Read the documents in the listed order. Installation and basic usage
  should be treated as prerequisite context before rendering, styling,
  directive syntax, configuration, or migration guidance.

order:
  - ./Index.md
  - ./getting-started/index.md
  - ./getting-started/installation.md
  - ./getting-started/fields-and-blocks.md
  - ./getting-started/rendering.md
  - ./configuration/index.md
  - ./configuration/plugin-config.md
  - ./configuration/scoping.md
  - ./configuration/code-blocks.md
  - ./configuration/styling.md
  - ./configuration/directive-themes.md
  - ./directives/index.md
  - ./directives/callout.md
  - ./directives/details.md
  - ./directives/table-of-contents.md
  - ./directives/steps.md
  - ./directives/cards.md
  - ./directives/buttons.md
  - ./directives/tabs.md
  - ./directives/layout.md
  - ./authoring/index.md
  - ./authoring/editor.md
  - ./authoring/markdown-in-markdown.md
  - ./authoring/rich-examples.md
  - ./advanced/index.md
  - ./advanced/migrations.md
  - ./advanced/v1-v1-1.md
  - ./advanced/troubleshooting.md
  - ./reference/api.md

exclude:
  - ./drafts/**

orphans: append
headingMode: normalize
